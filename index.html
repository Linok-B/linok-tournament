<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Tournament Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <!-- HOST CONTROLS -->
        <aside class="controls-panel">
            <h2>Host Controls</h2>
            
            <div class="control-group">
                <h3>Add Player</h3>
                <input type="text" id="player-name" placeholder="Player/Team Name">
                <input type="number" id="player-elo" placeholder="Starting ELO (e.g. 1200)" value="1200">
                <button id="btn-add-player">Add to Tournament</button>
            </div>
            
            <div class="control-group">
                <h3>Tournament Controls</h3>
                <button id="btn-start-elim">Start Single Elimination</button>
            </div>

            <div class="control-group">
                <button id="btn-clear-data" class="danger">Reset Entire Tournament</button>
            </div>
        </aside>

        <!-- TOURNAMENT DISPLAY -->
        <main class="display-panel">
            <h1>Tournament State</h1>
            <div id="player-list-container">
                <!-- UI Renderer will inject players here -->
            </div>
        </main>
    </div>

    <!-- type="module" is the secret to making this work without a build step -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
