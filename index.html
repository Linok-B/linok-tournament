<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Tournament Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <!-- HOST CONTROLS -->
        <aside class="controls-panel">
            <h2>Host Controls</h2>
            
            <!-- TOURNAMENT SETTINGS -->
            <div class="control-group">
                <h3>Settings</h3>
                
                <label style="font-size: 12px; color: gray;">Tournament Name</label>
                <input type="text" id="setting-name" placeholder="My Custom Tournament">
                
                <!-- NEW: Added LOSS Points! -->
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <div style="flex: 1;">
                        <label style="font-size: 11px; color: gray;">Win Pts</label>
                        <input type="number" id="setting-pts-win" value="3" style="width: 100%; box-sizing: border-box; padding: 5px;">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 11px; color: gray;">Draw Pts</label>
                        <input type="number" id="setting-pts-draw" value="1" style="width: 100%; box-sizing: border-box; padding: 5px;">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 11px; color: gray;">Loss Pts</label>
                        <input type="number" id="setting-pts-loss" value="0" style="width: 100%; box-sizing: border-box; padding: 5px;">
                    </div>
                </div>
            </div>

            <!-- Add Player Group -->
            <div class="control-group">
                <h3>Add Player</h3>
                <input type="text" id="player-name" placeholder="Player/Team Name">
                <input type="number" id="player-elo" placeholder="Starting ELO (e.g. 1200)" value="1200">
                <button id="btn-add-player">Add to Tournament</button>
            </div>

            <!-- Blueprint Builder -->
            <div class="control-group" id="setup-blueprint-group">
                <h3>Tournament Stages</h3>
                
                <!-- This empty div will be filled by JavaScript -->
                <div id="blueprint-list" style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px;"></div>
                
                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px;">
                    <label style="font-size: 11px; color: gray;">Format</label>
                    <select id="blueprint-type" style="width: 100%; margin-bottom: 5px; padding: 5px; background: var(--bg-dark); color: white; border: 1px solid #45475a;">
                        <option value="single_elimination">Single Elimination</option>
                        <option value="round_robin">Round Robin</option>
                        <option value="swiss">Swiss System</option>
                        <option value="double_elimination" disabled>Double Elim (Coming Soon)</option>
                    </select>
                    
                    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                        <div style="flex: 1;" title="Max rounds to play (for Swiss/Round Robin)">
                            <label style="font-size: 11px; color: gray;">Rounds (Opt)</label>
                            <input type="number" id="blueprint-rounds" placeholder="All" style="width: 100%; box-sizing: border-box; padding: 5px;">
                        </div>
                        <div style="flex: 1;" title="Only advance top N players from the Leaderboard">
                            <label style="font-size: 11px; color: gray;">Top Cut (Opt)</label>
                            <input type="number" id="blueprint-cut" placeholder="All" style="width: 100%; box-sizing: border-box; padding: 5px;">
                        </div>
                    </div>
                    <button id="btn-add-stage" style="width: 100%; background: var(--accent); color: var(--bg-dark); font-weight: bold;">+ Add Stage</button>
                </div>
            </div>

            <!-- Format Start Group -->
            <div class="control-group">
                <h3>Tournament Controls</h3>
                <button id="btn-start-elim">Start Tournament</button>
                <button id="btn-clear-data" class="danger">Reset Tournament</button>
            </div>

            <!-- Export / Import Group -->
            <div class="control-group">
                <h3>Data Management</h3>
                <button id="btn-export-data" style="background-color: #a6e3a1; color: #1e1e2e;">💾 Export to File</button>
                <input type="file" id="file-import" accept=".json" style="display: none;">
                <button id="btn-import-data" style="background-color: #f9e2af; color: #1e1e2e;">📂 Import from File</button>
            </div>
        </aside>

        <!-- TOURNAMENT DISPLAY -->
        <main class="display-panel">
            <h1 id="main-tournament-title">Tournament State</h1>
            <div id="player-list-container"></div>
            <div id="standings-container"></div> 
        </main>
    </div>

    <!-- WARNING MODAL (HIDDEN) -->
    <div id="warning-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: var(--bg-panel); padding: 30px; border-radius: 8px; max-width: 500px; border: 2px solid var(--danger); text-align: center;">
            <h2 style="color: var(--danger); margin-top: 0;">⚠️ DESTRUCTIVE ACTION</h2>
            <p id="warning-modal-text">Editing this match will permanently delete all rounds and stages that happened after it.</p>
            <p>It is highly recommended to Export a backup before continuing.</p>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
                <button id="modal-btn-cancel" style="background: #45475a; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">Cancel</button>
                <button id="modal-btn-export" style="background: #a6e3a1; color: #1e1e2e; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">💾 Backup Data</button>
                <button id="modal-btn-confirm" style="background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">Delete & Edit</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
