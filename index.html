<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Tournament Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <!-- HOST CONTROLS -->
        <aside class="controls-panel">
            <h2>Host Controls</h2>
            
            <!-- NEW: TOURNAMENT SETTINGS -->
            <div class="control-group">
                <h3>Settings</h3>
                
                <label style="font-size: 12px; color: gray;">Tournament Name</label>
                <input type="text" id="setting-name" placeholder="My Custom Tournament">
                
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <div style="flex: 1;">
                        <label style="font-size: 12px; color: gray;">Win Pts</label>
                        <input type="number" id="setting-pts-win" value="3" style="width: 100%; box-sizing: border-box;">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 12px; color: gray;">Draw Pts</label>
                        <input type="number" id="setting-pts-draw" value="1" style="width: 100%; box-sizing: border-box;">
                    </div>
                </div>
            </div>

            <!-- Existing Add Player Group -->
            <div class="control-group">
                <h3>Add Player</h3>
                <input type="text" id="player-name" placeholder="Player/Team Name">
                <input type="number" id="player-elo" placeholder="Starting ELO (e.g. 1200)" value="1200">
                <button id="btn-add-player">Add to Tournament</button>
            </div>
            
            <div class="control-group">
                <h3>Tournament Controls</h3>
                <button id="btn-start-elim">Start Single Elimination</button>
            </div>

            <div class="control-group">
                <button id="btn-clear-data" class="danger">Reset Entire Tournament</button>
            </div>

            <div class="control-group">
                <h3>Data Management</h3>
                <button id="btn-export-data" style="background-color: #a6e3a1; color: #1e1e2e;">💾 Export to File</button>
                
                <!-- Hidden file input triggered by the import button -->
                <input type="file" id="file-import" accept=".json" style="display: none;">
                <button id="btn-import-data" style="background-color: #f9e2af; color: #1e1e2e;">📂 Import from File</button>
            </div>
        </aside>

        <!-- TOURNAMENT DISPLAY -->
        <main class="display-panel">
            <h1>Tournament State</h1>
            <div id="player-list-container">
                <!-- UI Renderer will inject players here -->
            </div>
        </main>
    </div>
    <!-- TOURNAMENT DISPLAY -->
        <main class="display-panel">
            <h1>Tournament State</h1>
            <div id="player-list-container"></div>
            <!-- NEW STANDINGS CONTAINER -->
            <div id="standings-container"></div> 
        </main>

    <!-- CUSTOM WARNING MODAL -->
    <div id="warning-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: var(--bg-panel); padding: 30px; border-radius: 8px; max-width: 500px; border: 2px solid var(--danger); text-align: center;">
            <h2 style="color: var(--danger); margin-top: 0;">⚠️ DESTRUCTIVE ACTION</h2>
            <p id="warning-modal-text">Editing this match will permanently delete all rounds and stages that happened after it.</p>
            <p>It is highly recommended to Export a backup before continuing.</p>
            
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
                <button id="modal-btn-cancel" style="background: #45475a; color: white;">Cancel</button>
                <button id="modal-btn-export" style="background: #a6e3a1; color: #1e1e2e;">💾 Backup Data</button>
                <button id="modal-btn-confirm" style="background: var(--danger); color: white;">Delete & Edit</button>
            </div>
        </div>
    </div>
    
    <!-- type="module" to make this work without a build step -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
